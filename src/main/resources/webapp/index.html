<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Next Chess</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
</head>
<body>
<svg class="piece-sprite" aria-hidden="true" focusable="false">
    <symbol id="piece-pawn" viewBox="0 0 100 100">
        <circle cx="50" cy="25" r="12"></circle>
        <path d="M37 43h26l7 31H30z"></path>
        <path d="M24 76h52v10H24z"></path>
        <path d="M18 88h64v8H18z"></path>
    </symbol>
    <symbol id="piece-knight" viewBox="0 0 100 100">
        <path d="M25 88h56v8H19z"></path>
        <path d="M31 76h44v12H25z"></path>
        <path d="M38 74c2-17 7-27 18-37 4-4 6-9 5-15l-8-12 24 10c5 3 8 8 9 14 1 11-4 20-15 27l-8 5 11 10z"></path>
        <path d="M44 38l-13 7 8-16z"></path>
        <circle cx="67" cy="34" r="3"></circle>
    </symbol>
    <symbol id="piece-bishop" viewBox="0 0 100 100">
        <circle cx="50" cy="17" r="9"></circle>
        <path d="M36 70c-9-9-10-24-2-36l16-16 16 16c8 12 7 27-2 36z"></path>
        <path d="M52 30l-8 24 19-16z" fill="var(--piece-cut, transparent)"></path>
        <path d="M28 74h44v12H28z"></path>
        <path d="M20 88h60v8H20z"></path>
    </symbol>
    <symbol id="piece-rook" viewBox="0 0 100 100">
        <path d="M25 16h12v12h10V16h12v12h10V16h12v24H25z"></path>
        <path d="M31 40h38l-5 36H36z"></path>
        <path d="M26 76h48v12H26z"></path>
        <path d="M18 88h64v8H18z"></path>
    </symbol>
    <symbol id="piece-queen" viewBox="0 0 100 100">
        <circle cx="22" cy="23" r="7"></circle>
        <circle cx="39" cy="15" r="7"></circle>
        <circle cx="61" cy="15" r="7"></circle>
        <circle cx="78" cy="23" r="7"></circle>
        <path d="M18 32l15 35h34l15-35-17 15-15-24-15 24z"></path>
        <path d="M31 70h38v12H31z"></path>
        <path d="M22 86h56v10H22z"></path>
    </symbol>
    <symbol id="piece-king" viewBox="0 0 100 100">
        <path d="M46 9h8v12h12v8H54v13H46V29H34v-8h12z"></path>
        <path d="M35 70c-9-10-9-28 0-38 7-7 23-7 30 0 9 10 9 28 0 38z"></path>
        <path d="M29 73h42v13H29z"></path>
        <path d="M20 88h60v8H20z"></path>
    </symbol>
</svg>

<div class="app-shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">NC</div>
            <div>
                <p class="eyebrow">Local Analysis Workstation</p>
                <h1>Next Chess</h1>
            </div>
        </div>

        <div class="command-strip" aria-label="Application controls">
            <div class="mode-switch" role="group" aria-label="Board mode">
                <button class="mode-button is-active" id="play-mode-button" type="button">Play</button>
                <button class="mode-button" id="setup-mode-button" type="button">Setup</button>
            </div>

            <div class="command-group">
                <button class="icon-button" id="new-game-button" type="button" title="New game" aria-label="New game">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5zM8 8h8v8H8z"></path></svg>
                </button>
                <button class="icon-button" id="clear-board-button" type="button" title="Clear board" aria-label="Clear board">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10v10H7zM4 4h4v2H6v2H4zm12 0h4v4h-2V6h-2zM4 16h2v2h2v2H4zm14 0h2v4h-4v-2h2z"></path></svg>
                </button>
                <button class="icon-button" id="undo-button" type="button" title="Undo" aria-label="Undo">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7H4l5-5v3h6a6 6 0 1 1-5.7 8h2.3A4 4 0 1 0 15 7z"></path></svg>
                </button>
                <button class="icon-button" id="redo-button" type="button" title="Redo" aria-label="Redo">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 7h5l-5-5v3H9a6 6 0 1 0 5.7 8h-2.3A4 4 0 1 1 9 7z"></path></svg>
                </button>
                <button class="icon-button" id="flip-button" type="button" title="Flip board" aria-label="Flip board">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10l-3-3h3l5 5-5 5h-3l3-3H7zm10 16H7l3 3H7l-5-5 5-5h3l-3 3h10z"></path></svg>
                </button>
            </div>

            <span class="status-pill" id="status-pill">Ready</span>
        </div>
    </header>

    <main class="workspace">
        <section class="board-panel" aria-labelledby="board-title">
            <div class="board-head">
                <div>
                    <p class="eyebrow">Position</p>
                    <h2 id="board-title">Board</h2>
                </div>
                <div class="position-strip" aria-label="Position summary">
                    <div class="stat-block">
                        <span>Move</span>
                        <strong id="side-to-move">White</strong>
                    </div>
                    <div class="stat-block">
                        <span>State</span>
                        <strong id="position-health">Ready</strong>
                    </div>
                    <div class="stat-block">
                        <span>Best</span>
                        <strong id="best-line-summary">No line</strong>
                    </div>
                </div>
            </div>

            <div class="board-workbench">
                <aside class="eval-rail" aria-label="Evaluation">
                    <span class="eval-label eval-label--black">Black</span>
                    <div class="eval-bar">
                        <div class="eval-bar__fill" id="eval-fill"></div>
                        <div class="eval-bar__label" id="eval-label">0.00</div>
                    </div>
                    <span class="eval-label eval-label--white">White</span>
                </aside>

                <div class="board-stage">
                    <div class="board-frame">
                        <div class="board" id="board" aria-label="Chess board"></div>
                        <svg class="board-arrow" id="board-arrow" viewBox="0 0 800 800" preserveAspectRatio="none" aria-hidden="true"></svg>
                    </div>
                    <div class="board-caption" id="board-caption-text">White to move</div>
                </div>
            </div>
        </section>

        <aside class="inspector" aria-label="Analysis and position tools">
            <section class="panel analysis-panel" aria-labelledby="analysis-title">
                <div class="panel-head">
                    <div>
                        <p class="eyebrow">Analysis</p>
                        <h2 id="analysis-title">Engine Readout</h2>
                    </div>
                    <span class="badge" id="analysis-badge">Idle</span>
                </div>
                <div class="primary-actions">
                    <button class="button button--primary" id="analyze-button" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l8 6-8 6-8-6zm0 13l6-4.5V18l-6 4-6-4v-6.5z"></path></svg>
                        Analyze
                    </button>
                    <button class="button" id="play-best-button" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
                        Play Best
                    </button>
                </div>
                <div class="analysis-note" id="analysis-note">No analysis</div>
                <div class="analysis-lines" id="analysis-lines"></div>
            </section>

            <section class="panel setup-panel" aria-labelledby="setup-title">
                <div class="panel-head">
                    <div>
                        <p class="eyebrow">Setup</p>
                        <h2 id="setup-title">Position Editor</h2>
                    </div>
                    <span class="badge" id="setup-badge">Play</span>
                </div>
                <div class="piece-palette" id="piece-palette" aria-label="Piece palette"></div>
                <form class="metadata-grid" id="metadata-form">
                    <label class="field">
                        <span>Side</span>
                        <select id="metadata-side" name="sideToMove">
                            <option value="WHITE">White</option>
                            <option value="BLACK">Black</option>
                        </select>
                    </label>
                    <fieldset class="castle-field">
                        <legend>Castling</legend>
                        <label><input id="castle-wk" name="whiteCastleKing" type="checkbox"> K</label>
                        <label><input id="castle-wq" name="whiteCastleQueen" type="checkbox"> Q</label>
                        <label><input id="castle-bk" name="blackCastleKing" type="checkbox"> k</label>
                        <label><input id="castle-bq" name="blackCastleQueen" type="checkbox"> q</label>
                    </fieldset>
                    <label class="field">
                        <span>En passant</span>
                        <input id="ep-square" name="enPassantSquare" type="text" spellcheck="false">
                    </label>
                    <label class="field">
                        <span>Halfmove</span>
                        <input id="halfmove-clock" name="halfmoveClock" type="number" min="0" step="1">
                    </label>
                    <label class="field">
                        <span>Fullmove</span>
                        <input id="fullmove-number" name="fullmoveNumber" type="number" min="1" step="1">
                    </label>
                    <button class="button metadata-submit" id="apply-metadata-button" type="submit">Apply Metadata</button>
                </form>
            </section>

            <section class="panel utility-panel" aria-labelledby="position-title">
                <div class="panel-head">
                    <div>
                        <p class="eyebrow">Position</p>
                        <h2 id="position-title">FEN And History</h2>
                    </div>
                    <button class="icon-button" id="refresh-button" type="button" title="Refresh" aria-label="Refresh">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.8-4.2L13 11h8V3z"></path></svg>
                    </button>
                </div>
                <label class="field field--wide">
                    <span>FEN</span>
                    <input id="fen-input" type="text" spellcheck="false">
                </label>
                <div class="button-row">
                    <button class="button" id="load-fen-button" type="button">Load FEN</button>
                    <button class="button" id="copy-fen-button" type="button">Copy FEN</button>
                </div>
                <div class="history-grid" id="history-grid"></div>
            </section>

            <section class="panel engine-panel" aria-labelledby="engine-title">
                <div class="panel-head">
                    <div>
                        <p class="eyebrow">Engine</p>
                        <h2 id="engine-title">Configuration</h2>
                    </div>
                </div>
                <form class="engine-grid" id="engine-form">
                    <label class="field field--wide">
                        <span>Mode</span>
                        <select id="engine-mode" name="mode">
                            <option value="BUILTIN">Built-in Mini Engine</option>
                            <option value="UCI">External UCI Engine</option>
                        </select>
                    </label>
                    <label class="field field--wide">
                        <span>Engine path</span>
                        <input id="engine-path" name="enginePath" type="text" placeholder="/path/to/stockfish">
                    </label>
                    <div class="button-row field--wide">
                        <button class="button" id="detect-engine-button" type="button">Detect Engine</button>
                    </div>
                    <label class="field">
                        <span>Think s</span>
                        <input id="think-time" name="thinkTimeSeconds" type="number" min="0.05" step="0.05">
                    </label>
                    <label class="field">
                        <span>Depth</span>
                        <input id="depth" name="depth" type="number" min="1" step="1">
                    </label>
                    <label class="field">
                        <span>MultiPV</span>
                        <input id="multi-pv" name="multiPv" type="number" min="1" max="5" step="1">
                    </label>
                    <label class="field">
                        <span>Threads</span>
                        <input id="threads" name="threads" type="number" min="1" step="1">
                    </label>
                    <label class="field">
                        <span>Hash MB</span>
                        <input id="hash-mb" name="hashMb" type="number" min="1" step="1">
                    </label>
                </form>
            </section>
        </aside>
    </main>
</div>

<div class="toast" id="toast" hidden></div>

<div class="modal" id="promotion-modal" hidden>
    <div class="modal__backdrop" data-close-modal="true"></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="promotion-title">
        <p class="eyebrow">Promotion</p>
        <h2 id="promotion-title">Choose Piece</h2>
        <div class="promotion-grid" id="promotion-grid"></div>
        <button class="button" id="promotion-cancel-button" type="button">Cancel</button>
    </div>
</div>
</body>
</html>
