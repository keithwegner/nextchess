name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact_name: nextchess-macos
            archive_name: NextChess-macos.zip
          - os: ubuntu-latest
            label: Linux
            artifact_name: nextchess-linux
            archive_name: NextChess-linux.tar.gz
          - os: windows-latest
            label: Windows
            artifact_name: nextchess-windows
            archive_name: NextChess-windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build app image on macOS/Linux
        if: runner.os != 'Windows'
        run: bash ./scripts/package-app.sh

      - name: Build app image on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-app.ps1

      - name: Archive macOS app image
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/jpackage/NextChess.app ${{ matrix.archive_name }}

      - name: Archive Linux app image
        if: runner.os == 'Linux'
        run: tar -C dist/jpackage -czf ${{ matrix.archive_name }} NextChess

      - name: Archive Windows app image
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/jpackage/NextChess -DestinationPath ${{ matrix.archive_name }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find release-artifacts -type f | sort)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" --generate-notes --title "$GITHUB_REF_NAME"
